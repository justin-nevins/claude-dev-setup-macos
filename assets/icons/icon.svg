<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bgGrad)"/>

  <!-- Code bracket left < -->
  <path d="M70 80 L40 128 L70 176"
        fill="none"
        stroke="rgba(255,255,255,0.4)"
        stroke-width="12"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Code bracket right > -->
  <path d="M186 80 L216 128 L186 176"
        fill="none"
        stroke="rgba(255,255,255,0.4)"
        stroke-width="12"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Letter C -->
  <path d="M160 88
           C145 70, 115 68, 95 85
           C75 102, 72 138, 80 160
           C88 182, 110 198, 135 198
           C155 198, 168 188, 175 175"
        fill="none"
        stroke="url(#cGrad)"
        stroke-width="24"
        stroke-linecap="round"/>

  <!-- Setup gear accent (small) -->
  <circle cx="190" cy="190" r="28" fill="rgba(255,255,255,0.2)"/>
  <circle cx="190" cy="190" r="14" fill="url(#bgGrad)"/>
  <path d="M190 162 L190 168 M190 212 L190 218
           M162 190 L168 190 M212 190 L218 190
           M170 170 L175 175 M205 205 L210 210
           M210 170 L205 175 M175 205 L170 210"
        stroke="rgba(255,255,255,0.3)"
        stroke-width="6"
        stroke-linecap="round"/>
</svg>